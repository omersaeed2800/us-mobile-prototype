<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Mobile | B2B Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        usmBlue: '#0047FF',
                        usmDark: '#0A0B10',
                        usmGray: '#F4F7FA',
                        usmBorder: '#E5E7EB',
                        slackDark: '#1A1D21',
                        usmSuccess: '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .waterfall-entry { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cluster-signal { 
            animation: pulse-blue 2s infinite; 
            border: 2px solid rgba(0, 71, 255, 0.5);
        }
        @keyframes pulse-blue {
            0% { background-color: rgba(0, 71, 255, 0.05); }
            50% { background-color: rgba(0, 71, 255, 0.15); }
            100% { background-color: rgba(0, 71, 255, 0.05); }
        }
    </style>
</head>
<body class="bg-usmGray text-usmDark antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const B2BEnrichment = () => {
            const [step, setStep] = useState('content'); // content, enrichment, success
            const [email, setEmail] = useState('');
            const [dataPoints, setDataPoints] = useState([]);
            const [score, setScore] = useState(0);
            const [clusterDetected, setClusterDetected] = useState(false);

            const handleCapture = (e) => {
                e.preventDefault();
                setStep('enrichment');
                runEnrichment();
            };

            const runEnrichment = () => {
                const points = [
                    { label: 'Domain Identified', value: 'fedex.com', delay: 600 },
                    { label: 'Company Size', value: '500,000+ Employees', delay: 1200 },
                    { label: 'Industry', value: 'Logistics & Supply Chain', delay: 1800 },
                    { label: 'Est. Annual Revenue', value: '$90.2 Billion', delay: 2400 },
                    { label: 'Headquarters', value: 'Memphis, TN', delay: 3000 },
                ];

                points.forEach((p, i) => {
                    setTimeout(() => {
                        setDataPoints(prev => [...prev, p]);
                        setScore(Math.floor(((i + 1) / points.length) * 85));
                        
                        // Trigger Cluster Signal mid-way
                        if (i === 2) {
                            setClusterDetected(true);
                            setScore(98); // Boost score due to existing lines
                        }
                    }, p.delay);
                });

                setTimeout(() => setStep('success'), 4000);
            };

            return (
                <div class="min-h-screen flex flex-col">
                    {/* USM NAV */}
                    <nav class="bg-white border-b border-usmBorder px-8 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div class="text-2xl font-black text-usmBlue tracking-tighter uppercase italic">US Mobile <span class="text-gray-300 font-light ml-2 not-italic tracking-normal lowercase">/ help center</span></div>
                        <div class="flex items-center space-x-2">
                            <div class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></div>
                            <span class="text-[10px] font-black text-usmDark uppercase tracking-widest italic">Live Shadow Funnel Demo</span>
                        </div>
                    </nav>

                    <main class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-0 overflow-hidden">
                        
                        {/* LEFT: THE CONTENT (USER EXPERIENCE) */}
                        <div class="lg:col-span-7 bg-white p-12 lg:p-20 flex flex-col border-r border-usmBorder">
                            <div class="max-w-2xl">
                                <div class="mb-10 flex items-center space-x-3 text-usmBlue">
                                    <span class="text-[10px] font-black uppercase tracking-[0.2em] border border-usmBlue/20 px-2 py-0.5 rounded">Technical whitepaper</span>
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic">Topic: IoT / Fleet Routing</span>
                                </div>
                                
                                <h1 class="text-5xl font-black mb-8 tracking-tighter italic uppercase leading-[0.9]">Advanced APN Configuration for IoT Fleet Devices</h1>
                                
                                <div class="prose text-gray-500 font-medium leading-relaxed italic mb-12 text-lg">
                                    <p class="mb-6">This technical brief outlines the configuration requirements for high-density IoT deployments. For fleets exceeding 500+ active devices, standard consumer APNs will result in deprioritization during peak congestion windows.</p>
                                    <div class="bg-usmGray p-8 rounded-3xl border-l-8 border-usmBlue mb-8 font-mono text-sm shadow-inner">
                                        <span class="text-usmBlue font-bold">// Mandatory Fleet Config</span><br/>
                                        APN Name: usm.enterprise.iot<br/>
                                        Priority: QCI-8 (Always On)<br/>
                                        Tunneling: Static IP Enabled
                                    </div>
                                    <p>Note: Failure to utilize the Enterprise APN will bypass our logistics-optimized routing core.</p>
                                </div>

                                {/* THE TRIPWIRE HOOK */}
                                <div class="bg-usmBlue p-1 rounded-[3rem] shadow-2xl shadow-blue-900/20">
                                    <div class="bg-white rounded-[2.8rem] p-10 text-center border border-usmBlue/10">
                                        <div class="text-[10px] font-black text-usmBlue uppercase tracking-[0.3em] mb-4">Enterprise Access</div>
                                        <h3 class="text-2xl font-black mb-3 tracking-tight italic uppercase">Managing a fleet of 10+?</h3>
                                        <p class="text-sm text-gray-400 mb-8 font-bold italic uppercase tracking-tight">Unlock 2026 Fleet Pricing & IoT Provisioning Docs</p>
                                        
                                        <form onSubmit={handleCapture} class="flex flex-col md:flex-row gap-4 max-w-md mx-auto">
                                            <input 
                                                required
                                                type="email" 
                                                placeholder="Work email (e.g. ops@fedex.com)"
                                                class="flex-1 p-5 bg-usmGray border-2 border-transparent focus:border-usmBlue rounded-2xl font-bold outline-none transition-all shadow-inner italic"
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                                disabled={step !== 'content'}
                                            />
                                            <button type="submit" disabled={step !== 'content'} class="px-10 py-5 bg-usmBlue text-white font-black rounded-2xl hover:bg-blue-700 transition-all uppercase italic tracking-tighter shadow-lg">
                                                Get Fleet Pricing
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT: THE BACKEND (SHADOW INTELLIGENCE) */}
                        <div class="lg:col-span-5 bg-usmDark flex flex-col relative">
                            
                            <div class="p-10 lg:p-12 flex-1 flex flex-col">
                                <div class="flex items-center justify-between mb-12">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center text-white text-xs font-black italic shadow-[0_0_20px_rgba(147,51,234,0.5)]">CL</div>
                                        <div>
                                            <h2 class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic leading-none">Clay Intelligence Node</h2>
                                            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">Waterfall Enrichment Active</div>
                                        </div>
                                    </div>
                                    <div class={`text-[10px] font-black uppercase italic tracking-widest ${step === 'enrichment' ? 'text-usmBlue animate-pulse' : 'text-gray-700'}`}>
                                        {step === 'enrichment' ? 'Enriching Payload...' : step === 'success' ? 'Analysis Complete' : 'System Idle'}
                                    </div>
                                </div>

                                {step === 'content' && (
                                    <div class="flex-1 flex flex-col items-center justify-center text-center">
                                        <div class="w-20 h-20 border-4 border-dashed border-gray-800 rounded-full mb-6 flex items-center justify-center">
                                            <div class="w-2 h-2 bg-gray-800 rounded-full animate-ping"></div>
                                        </div>
                                        <p class="text-[10px] font-black text-gray-700 uppercase tracking-[0.3em] italic">Waiting for Signal...</p>
                                    </div>
                                )}

                                {(step === 'enrichment' || step === 'success') && (
                                    <div class="flex-1 space-y-4">
                                        {/* Domain Cluster Signal (The Flex Add) */}
                                        {clusterDetected && (
                                            <div class="cluster-signal p-5 rounded-2xl border-2 border-usmBlue/50 mb-8 flex items-start space-x-4 waterfall-entry">
                                                <div class="text-2xl mt-1">🛰️</div>
                                                <div>
                                                    <div class="text-[10px] font-black text-usmBlue uppercase tracking-widest italic mb-1">Domain Cluster Signal</div>
                                                    <p class="text-sm font-bold text-white italic leading-tight">Domain 'fedex.com' has 2 active lines detected. Flagging for expansion.</p>
                                                </div>
                                            </div>
                                        )}

                                        {dataPoints.map((point, i) => (
                                            <div key={i} class="waterfall-entry bg-white/5 border border-white/10 p-5 rounded-2xl flex justify-between items-center italic">
                                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">{point.label}</span>
                                                <span class="text-sm font-black text-white uppercase tracking-tight">{point.value}</span>
                                            </div>
                                        ))}
                                        
                                        {step === 'success' && (
                                            <div class="mt-12 pt-8 border-t border-white/10 waterfall-entry">
                                                <div class="flex justify-between items-end mb-4">
                                                    <span class="text-[10px] font-black text-gray-500 uppercase italic tracking-widest">Enterprise Score</span>
                                                    <span class="text-6xl font-black text-usmSuccess italic tracking-tighter leading-none">{score}<span class="text-xl">/100</span></span>
                                                </div>
                                                <div class="h-3 bg-white/10 rounded-full overflow-hidden shadow-inner">
                                                    <div class="h-full bg-usmSuccess transition-all duration-1000 shadow-[0_0_20px_rgba(16,185,129,0.8)]" style={{ width: `${score}%` }}></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* SLACK VIP ROUTING */}
                            {step === 'success' && (
                                <div class="bg-slackDark border-t border-slackBorder p-10 waterfall-entry">
                                    <div class="flex items-center space-x-2 mb-6">
                                        <span class="text-gray-500 text-xl font-black italic">#</span>
                                        <h3 class="text-xs font-black text-white uppercase tracking-[0.2em] italic">enterprise-priority-alerts</h3>
                                        <div class="bg-red-500 text-white text-[8px] px-3 py-1 rounded-full font-black uppercase ml-auto animate-pulse">Critical</div>
                                    </div>
                                    
                                    <div class="bg-white p-8 rounded-3xl">
                                        <div class="flex items-center space-x-4 mb-6">
                                            <div class="w-12 h-12 bg-usmDark rounded-2xl flex items-center justify-center font-black text-white text-sm italic">FX</div>
                                            <div>
                                                <div class="text-lg font-black text-usmDark italic leading-none uppercase">FedEx Opportunity</div>
                                                <div class="text-[9px] text-usmBlue font-black uppercase tracking-widest mt-1">Expansion Lead Detected</div>
                                            </div>
                                        </div>
                                        <p class="text-sm text-gray-500 font-bold italic leading-relaxed mb-8 border-l-4 border-usmBlue pl-4">
                                            "Ops Lead at <b>FedEx</b> just signaled intent via technical docs. Database cluster check confirms 2 lines already on Warp. Start expansion sequence."
                                        </p>
                                        <div class="grid grid-cols-2 gap-4 mb-4">
                                            <button class="py-4 bg-usmBlue text-white text-[10px] font-black rounded-xl uppercase italic tracking-widest shadow-lg shadow-blue-200">HubSpot Deal</button>
                                            <button class="py-4 bg-usmDark text-white text-[10px] font-black rounded-xl uppercase italic tracking-widest">Outbound Call</button>
                                        </div>
                                        <div class="text-[9px] text-usmSuccess font-black uppercase tracking-widest text-center italic">
                                            ✓ B2C Consumer Drip Suppressed
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer class="bg-black text-white p-12 border-t border-white/5">
                        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
                            <div class="max-w-lg">
                                <h4 class="text-[10px] font-black uppercase tracking-[0.4em] text-usmBlue mb-6 italic underline decoration-usmBlue decoration-4 underline-offset-8">Shadow Funnel Architecture</h4>
                                <p class="text-sm text-gray-400 font-bold italic leading-loose uppercase tracking-tight">
                                    We identify enterprise value without friction. By mapping technical intent to firmographic data, we route high-ACV leads to human sales while the consumer is still in the "Research" phase.
                                </p>
                            </div>
                            <div class="flex items-center space-x-16">
                                <div class="text-center">
                                    <div class="text-[10px] font-black text-gray-600 uppercase italic mb-2 tracking-widest">Expansion Delta</div>
                                    <div class="text-5xl font-black italic tracking-tighter text-white">+580%</div>
                                </div>
                                <div class="text-center border-l border-white/10 pl-16">
                                    <div class="text-[10px] font-black text-gray-600 uppercase italic mb-2 tracking-widest">CAC Efficiency</div>
                                    <div class="text-5xl font-black italic tracking-tighter text-usmBlue">8.2x</div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<B2BEnrichment />);
    </script>
</body>
</html>
