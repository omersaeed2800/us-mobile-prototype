<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Mobile | B2B Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        usmBlue: '#0047FF',
                        usmDark: '#0A0B10',
                        usmGray: '#F4F7FA',
                        usmBorder: '#E5E7EB',
                        slackDark: '#1A1D21',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .waterfall-entry { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-success { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="bg-usmGray text-usmDark antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const B2BEnrichment = () => {
            const [step, setStep] = useState('content'); // content, enrichment, success
            const [email, setEmail] = useState('');
            const [dataPoints, setDataPoints] = useState([]);
            const [score, setScore] = useState(0);

            const handleCapture = (e) => {
                e.preventDefault();
                setStep('enrichment');
                runEnrichment();
            };

            const runEnrichment = () => {
                const points = [
                    { label: 'Domain Identified', value: 'fedex.com', delay: 800 },
                    { label: 'Company Size', value: '500,000+ Employees', delay: 1500 },
                    { label: 'Industry', value: 'Logistics & Supply Chain', delay: 2200 },
                    { label: 'Est. Annual Revenue', value: '$90.2 Billion', delay: 2800 },
                    { label: 'Technology Stack', value: 'SAP, Verizon Business, IoT Core', delay: 3400 },
                ];

                points.forEach((p, i) => {
                    setTimeout(() => {
                        setDataPoints(prev => [...prev, p]);
                        setScore(Math.floor(((i + 1) / points.length) * 98));
                    }, p.delay);
                });

                setTimeout(() => setStep('success'), 4500);
            };

            return (
                <div class="min-h-screen flex flex-col">
                    {/* USM NAV */}
                    <nav class="bg-white border-b border-usmBorder px-8 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div class="text-2xl font-black text-usmBlue tracking-tighter">US Mobile <span class="text-gray-300 font-light ml-2">/ Help Center</span></div>
                        <div class="flex items-center space-x-6 text-xs font-bold text-gray-400 uppercase tracking-widest">
                            <span>B2B Pipeline Simulator</span>
                        </div>
                    </nav>

                    <main class="flex-1 max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 p-8">
                        
                        {/* LEFT: THE CONTENT (ACT 1) */}
                        <div class="lg:col-span-7 bg-white rounded-3xl p-10 border border-usmBorder shadow-sm overflow-hidden h-fit">
                            <div class="mb-8 flex items-center space-x-2 text-usmBlue">
                                <span class="text-xs font-black uppercase tracking-widest">Technical Guide</span>
                                <span class="h-1 w-1 bg-gray-300 rounded-full"></span>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest italic">IoT & Fleet Deployment</span>
                            </div>
                            
                            <h1 class="text-4xl font-black mb-6 tracking-tight italic">Advanced APN Configuration for IoT Fleet Devices</h1>
                            
                            <div class="prose prose-sm text-gray-500 font-medium leading-relaxed italic mb-10">
                                <p class="mb-4">This guide outlines the specific APN (Access Point Name) requirements for high-density IoT deployments using the US Mobile Warp network. For fleets exceeding 1,000 devices, we recommend a custom private APN setup to ensure QCI-8 priority remains consistent across geographic handoffs.</p>
                                <div class="bg-usmGray p-6 rounded-2xl border-l-4 border-usmBlue mb-6 font-mono text-xs">
                                    <span class="text-usmBlue font-bold"># Step 1: Manual Config</span><br/>
                                    APN Name: usm.warp.iot<br/>
                                    Bearer: NR_LTE_UNSPECIFIED<br/>
                                    Auth Type: PAP/CHAP
                                </div>
                                <p>Note: Standard consumer APNs (vzw.internet) will not support static IP addressing or VPN tunneling required for logistics software.</p>
                            </div>

                            {/* THE TRIPWIRE HOOK */}
                            <div class="bg-usmBlue/5 border-2 border-usmBlue/20 rounded-[2.5rem] p-8 text-center relative">
                                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-usmBlue text-white text-[10px] font-black uppercase tracking-[0.2em] px-4 py-2 rounded-full">B2B Fleet Unlock</div>
                                <h3 class="text-xl font-black mb-2 italic">Managing 10+ devices?</h3>
                                <p class="text-sm text-gray-500 mb-6 font-medium">Get the 2026 Fleet Pricing Sheet and Private APN Documentation.</p>
                                
                                <form onSubmit={handleCapture} class="flex flex-col md:flex-row gap-3">
                                    <input 
                                        required
                                        type="email" 
                                        placeholder="Enter work email (e.g. ops@fedex.com)"
                                        class="flex-1 p-4 bg-white border-2 border-transparent focus:border-usmBlue rounded-2xl font-bold outline-none transition-all shadow-inner"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        disabled={step !== 'content'}
                                    />
                                    <button type="submit" disabled={step !== 'content'} class="px-8 py-4 bg-usmBlue text-white font-black rounded-2xl hover:bg-blue-700 transition-all uppercase italic tracking-tighter shadow-lg shadow-blue-200">
                                        Unlock Sheet
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* RIGHT: THE BACKEND ENRICHMENT (ACT 2 & 3) */}
                        <div class="lg:col-span-5 space-y-6">
                            
                            {/* CLAY ENRICHMENT NODE */}
                            <div class="bg-usmDark rounded-3xl p-8 border border-white/5 shadow-2xl overflow-hidden min-h-[400px] flex flex-col">
                                <div class="flex items-center justify-between mb-8">
                                    <div class="flex items-center space-x-3">
                                        <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white text-xs font-black italic">CL</div>
                                        <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] italic">Clay Enrichment Node</h2>
                                    </div>
                                    <div class="text-[10px] font-black text-usmBlue uppercase italic tracking-widest animate-pulse">
                                        {step === 'enrichment' ? 'Syncing...' : step === 'success' ? 'Complete' : 'Listening'}
                                    </div>
                                </div>

                                {step === 'content' && (
                                    <div class="flex-1 flex flex-col items-center justify-center text-center opacity-30 italic">
                                        <div class="w-12 h-12 border-2 border-dashed border-gray-600 rounded-full mb-4"></div>
                                        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Waiting for Work Email Capture</p>
                                    </div>
                                )}

                                {(step === 'enrichment' || step === 'success') && (
                                    <div class="flex-1 space-y-4">
                                        {dataPoints.map((point, i) => (
                                            <div key={i} class="waterfall-entry bg-white/5 border border-white/10 p-4 rounded-2xl flex justify-between items-center italic">
                                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">{point.label}</span>
                                                <span class="text-sm font-bold text-white">{point.value}</span>
                                            </div>
                                        ))}
                                        
                                        {step === 'success' && (
                                            <div class="mt-8 pt-8 border-t border-white/10 waterfall-entry">
                                                <div class="flex justify-between items-end mb-2">
                                                    <span class="text-[10px] font-black text-gray-500 uppercase italic">Enterprise Lead Score</span>
                                                    <span class="text-4xl font-black text-usmSuccess italic tracking-tighter">{score}/100</span>
                                                </div>
                                                <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                                                    <div class="h-full bg-usmSuccess transition-all duration-1000 shadow-[0_0_15px_#10B981]" style={{ width: `${score}%` }}></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* SLACK VIP ROUTING (ACT 3) */}
                            {step === 'success' && (
                                <div class="bg-slackDark rounded-3xl p-8 border border-slackBorder shadow-2xl waterfall-entry">
                                    <div class="flex items-center space-x-2 mb-6">
                                        <span class="text-gray-500 text-lg font-black">#</span>
                                        <h3 class="text-xs font-black text-white uppercase tracking-widest italic">enterprise-alerts</h3>
                                        <span class="bg-red-500 text-white text-[8px] px-2 py-0.5 rounded-full font-black uppercase ml-auto animate-bounce">Priority 1</span>
                                    </div>
                                    
                                    <div class="bg-white/5 rounded-2xl p-6 border-l-4 border-usmBlue">
                                        <div class="flex items-center space-x-3 mb-4">
                                            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-black text-usmDark text-xs italic">FX</div>
                                            <div>
                                                <div class="text-sm font-black text-white italic">FedEx Logistics Opportunity</div>
                                                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Enriched via Clay x n8n</div>
                                            </div>
                                        </div>
                                        <p class="text-xs text-gray-300 font-medium italic leading-relaxed mb-6">
                                            "Ops Director signaled intent via <b>Technical IoT APN Guide</b>. High-value fleet candidate detected."
                                        </p>
                                        <div class="grid grid-cols-2 gap-3 mb-6">
                                            <button class="py-3 bg-usmBlue text-white text-[10px] font-black rounded-xl uppercase italic tracking-tighter">View HubSpot Deal</button>
                                            <button class="py-3 bg-white text-usmDark text-[10px] font-black rounded-xl uppercase italic tracking-tighter">Call Now (VOIP)</button>
                                        </div>
                                        <div class="text-[9px] text-gray-600 font-bold uppercase tracking-widest text-center">
                                            ✓ B2C Nurture Drip Paused (Bypass Triggered)
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* FAIZAN'S BOTTOM LINE */}
                    <footer class="bg-black text-white p-10 mt-auto">
                        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-8 md:space-y-0">
                            <div class="max-w-md">
                                <h4 class="text-xs font-black uppercase tracking-[0.4em] text-usmBlue mb-4 italic underline decoration-usmBlue decoration-4 underline-offset-8">Strategy Objective</h4>
                                <p class="text-sm text-gray-400 font-medium italic leading-relaxed">
                                    Capture Enterprise whales via technical gravity. We don't ask for company size—we use work-email enrichment to silently qualify $10,000+ ACV deals while they are still in the "Research" phase of the funnel.
                                </p>
                            </div>
                            <div class="flex space-x-12">
                                <div class="text-center">
                                    <div class="text-[10px] font-black text-gray-600 uppercase italic mb-2 tracking-widest">Lead Velocity</div>
                                    <div class="text-4xl font-black italic tracking-tighter">+42%</div>
                                </div>
                                <div class="text-center border-l border-white/10 pl-12">
                                    <div class="text-[10px] font-black text-gray-600 uppercase italic mb-2 tracking-widest">B2B Conversion</div>
                                    <div class="text-4xl font-black italic tracking-tighter">12.5%</div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<B2BEnrichment />);
    </script>
</body>
</html>
