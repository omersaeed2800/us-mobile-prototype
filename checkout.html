<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Mobile | Smart Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        usmBlue: '#0047FF',
                        usmDark: '#0A0B10',
                        usmGray: '#F4F7FA',
                        usmBorder: '#E5E7EB',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .modal-enter { animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-white text-usmDark antialiased font-sans">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-usmBlue font-bold animate-pulse">Initializing Smart Checkout...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SmartCheckout = () => {
            const [showIntervention, setShowIntervention] = useState(false);
            const [deferred, setDeferred] = useState(false);
            const [email, setEmail] = useState('');
            const [expiryDate, setExpiryDate] = useState('');
            const [leads, setLeads] = useState([]);
            const [hasExited, setHasExited] = useState(false);

            useEffect(() => {
                const handleMouseLeave = (e) => {
                    if (e.clientY <= 0 && !hasExited && !deferred) {
                        setShowIntervention(true);
                        setHasExited(true);
                    }
                };
                document.addEventListener('mouseleave', handleMouseLeave);
                return () => document.removeEventListener('mouseleave', handleMouseLeave);
            }, [hasExited, deferred]);

            const handleDeferredSubmit = (e) => {
                e.preventDefault();
                const expDate = new Date(expiryDate + 'T00:00:00');
                const reminderDate = new Date(expDate);
                reminderDate.setDate(reminderDate.getDate() - 2);
                
                const newLead = {
                    email: email,
                    expiryDate: expiryDate,
                    reminderDate: reminderDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                    status: 'Deferred Intent'
                };

                setLeads([newLead, ...leads]);
                setDeferred(true);
                setShowIntervention(false);
            };

            return (
                <div class="min-h-screen bg-usmGray flex flex-col">
                    {/* Header */}
                    <nav class="bg-white border-b border-usmBorder px-8 py-4 flex justify-between items-center">
                        <div class="text-2xl font-black text-usmBlue tracking-tighter">US Mobile</div>
                        <div class="hidden md:flex items-center space-x-6 text-sm font-semibold text-gray-500">
                            <span class="text-usmBlue">1. Plan Selection</span>
                            <span class="text-usmBlue">2. Customization</span>
                            <span class="text-black underline underline-offset-8 decoration-usmBlue decoration-2">3. Checkout</span>
                        </div>
                    </nav>

                    <main class="flex-1 max-w-5xl w-full mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 p-8 mt-8">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-white rounded-2xl p-8 border border-usmBorder shadow-sm">
                                <h2 class="text-xl font-bold mb-6 text-usmBlue">Review & Pay</h2>
                                <div class="space-y-4 opacity-50 pointer-events-none">
                                    <div class="h-12 bg-gray-100 rounded-lg w-full shimmer"></div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="h-12 bg-gray-100 rounded-lg shimmer"></div>
                                        <div class="h-12 bg-gray-100 rounded-lg shimmer"></div>
                                    </div>
                                    <div class="h-48 bg-gray-50 rounded-lg border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-400 font-bold uppercase tracking-widest text-center">
                                        Payment Method Placeholder
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-white rounded-2xl p-6 border border-usmBorder shadow-sm">
                                <h3 class="font-bold text-lg mb-4">Order Summary</h3>
                                <div class="flex justify-between mb-2">
                                    <span class="text-gray-500">Unlimited Starter</span>
                                    <span class="font-bold">$25.00</span>
                                </div>
                                <div class="border-t border-usmBorder pt-4 flex justify-between items-center mb-6">
                                    <span class="font-bold text-xl">Total Due</span>
                                    <span class="font-black text-2xl text-usmBlue">$25.00</span>
                                </div>
                                <button class="w-full py-4 bg-usmBlue text-white font-bold rounded-xl opacity-50 cursor-not-allowed">
                                    Complete Activation
                                </button>
                            </div>

                            <div class="text-center p-6 bg-blue-50 rounded-2xl border border-blue-100 mt-4">
                                <p class="text-sm text-blue-800 mb-4 font-semibold">Demo: Simulate leaving the page, or click below.</p>
                                <button 
                                    onClick={() => setShowIntervention(true)}
                                    class="w-full px-6 py-2 bg-white text-usmBlue border border-usmBlue font-bold rounded-xl hover:bg-blue-50 transition-all shadow-sm"
                                >
                                    Force Exit Intent
                                </button>
                            </div>
                        </div>
                    </main>

                    {showIntervention && (
                        <div class="fixed inset-0 bg-usmDark/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                            <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl modal-enter">
                                <div class="text-center mb-6">
                                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4 font-bold text-3xl">💡</div>
                                    <h2 class="text-2xl font-black text-usmDark tracking-tight">Timing isn't right?</h2>
                                    <p class="text-gray-500 mt-2 leading-relaxed font-medium">
                                        Don't burn the remaining days on your current plan. We'll hold your rate and remind you when it's time to switch.
                                    </p>
                                </div>

                                <form onSubmit={handleDeferredSubmit} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Plan End Date</label>
                                        <input 
                                            required
                                            type="date" 
                                            class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-usmBlue rounded-xl font-bold outline-none transition-all"
                                            value={expiryDate}
                                            onChange={e => setExpiryDate(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Email for Reminder</label>
                                        <input 
                                            required
                                            type="email" 
                                            placeholder="hello@example.com"
                                            class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-usmBlue rounded-xl font-bold outline-none transition-all"
                                            value={email}
                                            onChange={e => setEmail(e.target.value)}
                                        />
                                    </div>
                                    <button type="submit" class="w-full py-4 bg-usmBlue text-white font-black rounded-xl hover:bg-blue-700 transition-all shadow-lg">
                                        Hold My Spot
                                    </button>
                                    <button type="button" onClick={() => setShowIntervention(false)} class="w-full py-2 text-gray-400 font-bold text-sm hover:text-usmDark transition-all">
                                        Back to Checkout
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {deferred && (
                        <div class="fixed inset-0 bg-usmDark/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                            <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl modal-enter text-center">
                                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 font-bold text-3xl">✓</div>
                                <h2 class="text-3xl font-black mb-2 tracking-tight text-usmDark uppercase italic">Spot Secured.</h2>
                                <p class="text-gray-500 mb-8 leading-relaxed font-medium">
                                    We've reserved your rate. Your Digital SIM is ready for you on <b class="text-usmDark text-lg underline decoration-usmBlue decoration-4 underline-offset-4">{leads[0].reminderDate}</b>.
                                </p>
                                
                                <div class="bg-usmGray rounded-2xl p-6 mb-8 text-left border border-usmBorder">
                                    <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Next Steps</div>
                                    <div class="flex items-start space-x-3 mb-4">
                                        <div class="w-6 h-6 bg-usmBlue text-white rounded-full flex-shrink-0 flex items-center justify-center text-[10px] font-black italic">1</div>
                                        <div class="text-sm font-bold text-usmDark italic underline">We'll email you 48h before.</div>
                                    </div>
                                    <div class="flex items-start space-x-3">
                                        <div class="w-6 h-6 bg-usmBlue text-white rounded-full flex-shrink-0 flex items-center justify-center text-[10px] font-black italic">2</div>
                                        <div class="text-sm font-bold text-usmDark italic underline">1-tap activation for {email}.</div>
                                    </div>
                                </div>

                                <button onClick={() => setDeferred(false)} class="w-full py-4 bg-usmBlue text-white font-black rounded-xl hover:bg-blue-700 transition-all mb-4 shadow-lg uppercase italic">
                                    Add to Calendar
                                </button>
                                <button onClick={() => setDeferred(false)} class="text-gray-400 font-bold text-sm hover:text-usmDark transition-all">
                                    Dismiss
                                </button>
                            </div>
                        </div>
                    )}

                    <footer class="bg-white border-t border-usmBorder p-8 mt-auto">
                        <div class="max-w-5xl mx-auto">
                            <h3 class="font-black text-lg flex items-center italic uppercase text-usmDark mb-6">
                                <span class="w-3 h-3 bg-green-500 rounded-full mr-3 animate-pulse"></span>
                                Deferred Intent Lead Log
                            </h3>
                            <div class="overflow-x-auto border border-usmBorder rounded-xl shadow-sm bg-white">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-gray-50 border-b border-usmBorder text-[10px] font-black text-gray-400 uppercase tracking-widest">
                                        <tr>
                                            <th class="p-4">Email</th>
                                            <th class="p-4">Expiry Date</th>
                                            <th class="p-4">Reminder Date</th>
                                            <th class="p-4">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-usmBorder">
                                        {leads.length === 0 ? (
                                            <tr>
                                                <td colspan="4" class="p-12 text-center text-gray-300 italic font-semibold italic">No data captured yet.</td>
                                            </tr>
                                        ) : (
                                            leads.map((lead, i) => (
                                                <tr key={i} class="hover:bg-blue-50/30 transition-colors italic font-bold">
                                                    <td class="p-4 text-usmDark">{lead.email}</td>
                                                    <td class="p-4 text-gray-500">{lead.expiryDate}</td>
                                                    <td class="p-4 text-usmBlue">{lead.reminderDate}</td>
                                                    <td class="p-4">
                                                        <span class="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-black uppercase italic">Queued</span>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SmartCheckout />);
    </script>
</body>
</html>
