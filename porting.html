<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Mobile | Porting Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        usmBlue: '#0047FF',
                        usmDark: '#0A0B10',
                        usmGray: '#F4F7FA',
                        usmBorder: '#E5E7EB',
                        usmSuccess: '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .sms-bounce { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes bounceIn {
            from { opacity: 0; transform: translateY(100px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .log-entry { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-usmGray text-usmDark antialiased font-sans">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-usmBlue font-bold animate-pulse italic uppercase tracking-widest">Waking up Safety Net...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PortingSafetyNet = () => {
            const [carrier, setCarrier] = useState('Mint Mobile');
            const [timer, setTimer] = useState(15);
            const [systemLog, setSystemLog] = useState([]);
            const [showSMS, setShowSMS] = useState(false);
            const [interventionSent, setInterventionSent] = useState(false);
            const [isIdle, setIsIdle] = useState(false);

            const carriers = {
                'Mint Mobile': { pinGuide: 'Open the Mint app > Account > Transfer Number. Your PIN is 1234.', code: '#PORT not required' },
                'Verizon': { pinGuide: 'Dial #PORT from your Verizon phone to generate a Transfer PIN.', code: '#PORT' },
                'T-Mobile': { pinGuide: 'Log in to T-Mobile.com > Account > Profile Settings > Line Settings > Request Transfer PIN.', code: 'Account PIN' }
            };

            // Timer Watcher
            useEffect(() => {
                if (timer > 0 && !interventionSent) {
                    const id = setInterval(() => setTimer(t => t - 1), 1000);
                    return () => clearInterval(id);
                } else if (timer === 0 && !interventionSent) {
                    setIsIdle(true);
                }
            }, [timer, interventionSent]);

            // Trigger Backend Logic once timer hits 0
            useEffect(() => {
                if (isIdle && !interventionSent) {
                    runOrchestration();
                }
            }, [isIdle]);

            const runOrchestration = () => {
                const logs = [
                    { msg: 'CRON: Hourly check started...', type: 'info' },
                    { msg: 'SQL: SELECT * FROM porting WHERE status="PENDING" AND idle_time > 15m', type: 'sql' },
                    { msg: 'MATCH: User found (Current Carrier: ' + carrier + ')', type: 'success' },
                    { msg: 'CRM: Cross-referencing HubSpot (Port_Intervention_Sent = False)', type: 'info' },
                    { msg: 'TWILIO: Firing carrier-specific guide...', type: 'success' },
                    { msg: 'CRM: Updating Port_Intervention_Sent = True', type: 'info' }
                ];

                let i = 0;
                const intervalId = setInterval(() => {
                    if (i < logs.length) {
                        const currentLog = logs[i];
                        setSystemLog(prev => [currentLog, ...prev]);
                        if (currentLog.msg.includes('TWILIO')) setShowSMS(true);
                        i++;
                    } else {
                        clearInterval(intervalId);
                        setInterventionSent(true);
                    }
                }, 800);
            };

            const resetDemo = (newCarrier) => {
                setCarrier(newCarrier);
                setTimer(15);
                setSystemLog([]);
                setShowSMS(false);
                setInterventionSent(false);
                setIsIdle(false);
            };

            return (
                <div class="min-h-screen flex flex-col md:flex-row">
                    {/* LEFT: THE APP UI */}
                    <div class="flex-1 p-8 md:p-12 bg-white flex flex-col justify-center border-r border-usmBorder relative overflow-hidden">
                        <div class="max-w-md mx-auto w-full">
                            <div class="text-xs font-black text-usmBlue uppercase tracking-widest mb-2">Step 4 of 6</div>
                            <h1 class="text-3xl font-black mb-2 tracking-tight italic uppercase">Transfer number</h1>
                            <p class="text-gray-400 mb-10 font-bold leading-relaxed italic">We'll move your number in minutes. Most ports take less than 1 hour.</p>

                            <div class="space-y-6">
                                <div>
                                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 italic">Select Current Carrier</label>
                                    <select 
                                        value={carrier}
                                        onChange={(e) => resetDemo(e.target.value)}
                                        class="w-full p-4 bg-usmGray border-2 border-transparent focus:border-usmBlue rounded-xl font-bold outline-none transition-all appearance-none italic"
                                    >
                                        <option>Mint Mobile</option>
                                        <option>Verizon</option>
                                        <option>T-Mobile</option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 italic">Account Number</label>
                                        <input type="text" placeholder="e.g. 1234567" class="w-full p-4 bg-usmGray border-2 border-transparent focus:border-usmBlue rounded-xl font-bold outline-none italic" />
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 italic">Transfer PIN</label>
                                        <input type="text" placeholder="e.g. 0000" class="w-full p-4 bg-usmGray border-2 border-transparent focus:border-usmBlue rounded-xl font-bold outline-none italic" />
                                    </div>
                                </div>

                                <div class="p-4 bg-blue-50 border border-blue-100 rounded-xl text-xs text-blue-800 leading-relaxed font-bold italic">
                                    💡 Help: You can find this on your {carrier} bill or in their app.
                                </div>

                                <button class="w-full py-5 bg-usmBlue text-white font-black rounded-2xl opacity-50 cursor-not-allowed uppercase italic tracking-tighter">Activate Number</button>
                            </div>
                        </div>

                        {/* MOCK SMS POPUP */}
                        {showSMS && (
                            <div class="absolute bottom-8 left-8 right-8 md:left-auto md:right-12 md:w-80 sms-bounce z-50">
                                <div class="bg-usmDark text-white p-5 rounded-[2.5rem] shadow-2xl flex items-start space-x-4 border border-white/10">
                                    <div class="w-12 h-12 bg-usmBlue rounded-2xl flex items-center justify-center text-white text-xl flex-shrink-0 font-bold italic">💬</div>
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="font-black text-[10px] text-usmBlue uppercase italic tracking-[0.2em]">US Mobile Intel</span>
                                            <span class="text-[9px] text-gray-500 font-bold uppercase italic">Now</span>
                                        </div>
                                        <p class="text-xs font-bold leading-tight italic">
                                            Still porting from {carrier}? {carriers[carrier].pinGuide} Tap to finish: <span class="text-usmBlue underline">usm.run/port</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* RIGHT: THE BACKEND DASHBOARD */}
                    <div class="w-full md:w-[400px] bg-usmDark p-8 flex flex-col text-white font-mono text-xs">
                        <div class="flex items-center justify-between mb-12">
                            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] italic">Safety Net Monitor</h2>
                            <div class="px-2 py-1 bg-usmBlue/20 text-usmBlue border border-usmBlue/30 rounded text-[9px] font-black uppercase italic">Build v1.0.3</div>
                        </div>

                        {/* Timer Section */}
                        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 mb-8">
                            <div class="text-[10px] text-gray-500 uppercase mb-3 font-black italic tracking-[0.15em]">Inactivity Threshold</div>
                            <div class="flex items-end space-x-3">
                                <div class={`text-5xl font-black italic tracking-tighter ${timer === 0 ? 'text-usmSuccess' : 'text-white'}`}>
                                    {timer > 0 ? `00:${timer.toString().padStart(2, '0')}` : 'FIRED'}
                                </div>
                                <div class="text-gray-500 mb-2 font-bold italic uppercase text-[10px]">/ 15m</div>
                            </div>
                            <div class="mt-6 h-1.5 bg-white/10 rounded-full overflow-hidden">
                                <div class="h-full bg-usmBlue transition-all duration-1000 shadow-[0_0_15px_rgba(0,71,255,0.5)]" style={{ width: `${(timer/15)*100}%` }}></div>
                            </div>
                        </div>

                        {/* Orchestration Log */}
                        <div class="flex-1 space-y-4 overflow-y-auto pr-2 custom-scrollbar">
                            <div class="text-[10px] text-gray-500 uppercase mb-6 font-black italic tracking-[0.15em]">Orchestration Stack</div>
                            {systemLog.length === 0 && (
                                <div class="text-gray-600 italic font-bold uppercase tracking-tighter opacity-50 animate-pulse">Waiting for user hesitation...</div>
                            )}
                            {systemLog.map((log, i) => (
                                <div key={i} class="log-entry flex space-x-3 italic border-l-2 border-white/5 pl-4 py-1">
                                    <span class={`font-black ${log.type === 'success' ? 'text-usmSuccess' : log.type === 'sql' ? 'text-usmBlue' : 'text-gray-600'}`}>
                                        {log.type === 'success' ? '✓' : log.type === 'sql' ? 'λ' : '>'}
                                    </span>
                                    <span class={log.type === 'success' ? 'text-usmSuccess font-black uppercase italic tracking-widest' : 'text-gray-400 font-bold uppercase tracking-tight'}>
                                        {log.msg}
                                    </span>
                                </div>
                            ))}
                        </div>

                        {/* CRM Status */}
                        <div class="mt-8 pt-8 border-t border-white/10">
                            <div class="flex justify-between items-center mb-4 italic">
                                <span class="text-gray-500 font-black uppercase tracking-[0.2em] text-[10px]">HubSpot CRM Sync</span>
                                <span class={`text-[10px] font-black uppercase italic px-2 py-0.5 rounded ${interventionSent ? 'bg-usmSuccess/20 text-usmSuccess border border-usmSuccess/30' : 'bg-white/5 text-gray-600 border border-white/10'}`}>
                                    {interventionSent ? 'Synced' : 'Ready'}
                                </span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10 italic">
                                <span class="text-gray-400 font-bold uppercase tracking-tighter text-[11px]">Port_Intervention_Sent</span>
                                <span class={`font-black uppercase text-[10px] ${interventionSent ? 'text-usmSuccess' : 'text-gray-600'}`}>
                                    {interventionSent ? 'True' : 'False'}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortingSafetyNet />);
    </script>
</body>
</html>
